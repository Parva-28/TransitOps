<style>
.maint-grid{display:grid;grid-template-columns:1fr 1.4fr;gap:20px}
.service-log-table{width:100%;border-collapse:collapse}
.service-log-table thead th{font-size:10.5px;font-weight:600;color:#94a3b8;text-transform:uppercase;letter-spacing:.07em;padding:10px 16px;text-align:left;border-bottom:1px solid #f1f5f9}
.service-log-table tbody td{padding:14px 16px;font-size:12.5px;color:#475569;border-bottom:1px solid #f1f5f9}
.service-log-table tbody tr:hover td{background:#f8fafc}
.cost-cell{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700;color:#0f172a}
/* Status Flow */
.flow-row{display:flex;align-items:center;gap:8px;padding:10px 0;border-bottom:1px solid #f1f5f9}
.flow-row:last-child{border-bottom:none}
.flow-badge{font-size:12px;font-weight:700;padding:4px 12px;border-radius:6px;border:1px solid}
.flow-badge.avail{background:#ecfdf5;color:#059669;border-color:#a7f3d0}
.flow-badge.inshop{background:#fee2e2;color:#dc2626;border-color:#fecaca}
.flow-arrow{display:flex;align-items:center;gap:6px;flex:1}
.flow-desc{font-size:11.5px;color:#94a3b8;font-weight:500}
.flow-caret{color:#94a3b8;font-size:14px}
</style>
</head>
