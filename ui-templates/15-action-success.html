<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TransitOps — Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
.kpi-grid{display:grid;grid-template-columns:1.5fr 1fr 1fr 1fr;gap:16px;margin-bottom:24px}
.main-grid{display:grid;grid-template-columns:2fr 1fr;gap:16px;margin-bottom:24px}
.chart-card{background:#fff;border:1px solid #e5e5e5;border-radius:10px;padding:24px}
.chart-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px}
.chart-tabs{display:flex;gap:2px;background:#f5f5f5;padding:3px;border-radius:6px}
.chart-tab{font-size:11px;font-weight:600;color:#737373;padding:4px 10px;border-radius:4px;cursor:pointer;border:none;background:transparent;font-family:'Inter',sans-serif;transition:all .15s}
.chart-tab.active{color:#111;background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.08);border:1px solid #e5e5e5}
.side-panel{display:flex;flex-direction:column;gap:16px}
.side-card{background:#fff;border:1px solid #e5e5e5;border-radius:10px;padding:20px;flex:1}
.donut-wrap{display:flex;align-items:center;justify-content:center;margin-bottom:16px}
.donut-legend{display:flex;flex-direction:column;gap:9px}
.legend-row{display:flex;justify-content:space-between;align-items:center}
.legend-left{display:flex;align-items:center;gap:8px}
.legend-dot{width:7px;height:7px;border-radius:2px}
.legend-label{font-size:12px;color:#525252;font-weight:500}
.legend-val{font-size:12px;font-weight:700;color:#111;font-family:'JetBrains Mono',monospace}
.maint-item{display:flex;align-items:center;gap:10px;margin-bottom:12px;padding:10px;background:#f9fafb;border-radius:8px}
.maint-icon{width:30px;height:30px;border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.maint-name{font-size:12px;font-weight:600;color:#171717;line-height:1.4}
.maint-meta{font-size:11px;color:#9ca3af;margin-top:1px}
.maint-badge{font-size:10px;font-weight:700;padding:2px 6px;border-radius:4px;margin-left:auto;white-space:nowrap}
.trip-id{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:12px;color:#111;letter-spacing:.02em}
.route-cell{display:flex;align-items:center;gap:5px;font-size:12px;color:#525252;font-weight:500}
.driver-cell{display:flex;align-items:center;gap:8px}
.d-avatar{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:800;flex-shrink:0}
.cargo-cell{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:#111;text-align:right}
</style>
</head>
