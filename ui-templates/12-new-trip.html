<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TransitOps — Trip Dispatcher</title>

<link rel="stylesheet" href="style.css">
<style>
.dispatch-grid{display:grid;grid-template-columns:1fr 1.1fr;gap:20px}
/* Lifecycle timeline */
.lifecycle{display:flex;align-items:center;margin-bottom:24px;background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:20px}
.lc-step{display:flex;flex-direction:column;align-items:center;gap:6px;flex:1;position:relative}
.lc-step:not(:last-child)::after{content:'';position:absolute;top:14px;left:60%;width:80%;height:2px;background:#e2e8f0;z-index:0}
.lc-step.done::after{background:#0d9488}
.lc-dot{width:28px;height:28px;border-radius:50%;border:2px solid #e2e8f0;display:flex;align-items:center;justify-content:center;background:#fff;position:relative;z-index:1;font-size:11px;font-weight:700;color:#94a3b8;transition:all .2s}
.lc-step.done .lc-dot{background:#0d9488;border-color:#0d9488;color:#fff}
.lc-step.active .lc-dot{background:#fff;border-color:#0d9488;border-width:2.5px;color:#0d9488;box-shadow:0 0 0 4px rgba(13,148,136,.12)}
.lc-label{font-size:11px;font-weight:600;color:#94a3b8;white-space:nowrap}
.lc-step.done .lc-label,.lc-step.active .lc-label{color:#0f172a;font-weight:700}
/* Live Board cards */
.live-board{display:flex;flex-direction:column;gap:12px;max-height:640px;overflow-y:auto}
.lb-card{border-radius:10px;border:1px solid #e2e8f0;padding:14px 16px;cursor:pointer;transition:box-shadow .15s}
.lb-card:hover{box-shadow:0 4px 12px rgba(15,23,42,.08)}
.lb-card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.lb-trip-id{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700;color:#0f172a}
.lb-route{font-size:12px;color:#475569;margin-bottom:10px;line-height:1.5}
.lb-meta{display:flex;align-items:center;justify-content:space-between}
.lb-vehicle{font-size:12px;font-weight:600;color:#0f172a}
.lb-driver{display:flex;align-items:center;gap:5px;font-size:11.5px;color:#64748b}
.lb-eta{font-size:11px;font-weight:600;color:#059669;background:#ecfdf5;padding:2px 6px;border-radius:4px;font-family:'JetBrains Mono',monospace}
/* Create form */
.create-form{background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:24px}
.form-grid-2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
.form-grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin-bottom:14px}
.cap-error{background:#fee2e2;border:1px solid #fecaca;border-radius:8px;padding:10px 14px;margin:10px 0}
.cap-error-title{font-size:12px;font-weight:700;color:#991b1b;display:flex;align-items:center;gap:6px;margin-bottom:4px}
.cap-error-row{font-size:11.5px;color:#b91c1c;line-height:1.6}
.biz-rules{background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:14px;margin-top:16px}
.biz-title{font-size:10px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px}
.biz-rule{font-size:11.5px;color:#64748b;margin-bottom:6px;display:flex;align-items:flex-start;gap:6px;line-height:1.5}
.biz-rule::before{content:'·';font-size:16px;line-height:1;flex-shrink:0;color:#94a3b8}
.status-highlight{font-weight:700;padding:1px 5px;border-radius:3px}
.on-trip{background:#fef3c7;color:#d97706}
.available{background:#ecfdf5;color:#059669}
</style>
</head>
