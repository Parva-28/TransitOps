<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TransitOps — Fuel & Expenses</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
.fuel-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px}
.section-label{font-size:10px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:.1em;margin-bottom:14px}
.fuel-table{width:100%;border-collapse:collapse}
.fuel-table thead th{font-size:10.5px;font-weight:600;color:#94a3b8;text-transform:uppercase;letter-spacing:.07em;padding:9px 16px;text-align:left;border-bottom:1px solid #f1f5f9}
.fuel-table tbody td{padding:12px 16px;font-size:12.5px;color:#475569;border-bottom:1px solid #f8fafc}
.fuel-table tbody tr:hover td{background:#f8fafc}
.fuel-table tbody tr:last-child td{border-bottom:none}
.fuel-cost{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700;color:#0f172a}
.liters{font-family:'JetBrains Mono',monospace;font-size:12.5px;font-weight:600;color:#475569}
.link-badge{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:600;color:#7c3aed;background:#f5f3ff;padding:2px 7px;border-radius:4px;border:1px solid #e9d5ff}
.total-bar{background:#0c0c0c;border-radius:10px;padding:20px 24px;display:flex;align-items:center;justify-content:space-between;margin-top:20px}
.total-bar-item{display:flex;flex-direction:column;align-items:center;gap:4px}
.total-bar-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:#64748b}
.total-bar-val{font-family:'JetBrains Mono',monospace;font-size:20px;font-weight:700;color:#f1f5f9}
.total-bar-divider{width:1px;height:36px;background:#1f2937}
.total-grand{font-family:'JetBrains Mono',monospace;font-size:26px;font-weight:800;color:#14b8a6}
</style>
</head>
<body>
<nav class="sidebar">
  <div class="sidebar-logo"><div style="display:flex;align-items:center;gap:10px"><div class="logo-mark">T</div><div><div style="font-size:14px;font-weight:700;color:#f1f5f9">TransitOps</div><div style="font-size:9px;color:#475569;text-transform:uppercase;letter-spacing:.12em;font-weight:600">Operations</div></div></div></div>
  <div class="sidebar-nav">
    <div class="nav-group-label">Command</div>

    <a class="nav-item" href="03-vehicle-registry.html"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M19 17h2c.6 0 1-.4 1-1v-3c0-.9-.7-1.7-1.5-1.9C18.7 10.6 16 10 16 10s-1.3-1.4-2.2-2.3c-.5-.4-1.1-.7-1.8-.7H5c-.6 0-1.1.4-1.4.9l-1.4 2.9A3.7 3.7 0 0 0 2 12v4c0 .6.4 1 1 1h2"/><circle cx="7" cy="17" r="2"/><circle cx="17" cy="17" r="2"/></svg>Fleet</a>
    <a class="nav-item" href="04-drivers.html"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>Drivers</a>
    <a class="nav-item" href="05-trip-dispatcher.html"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>Trips<span class="nav-badge">18</span></a>
    <div class="nav-group-label" style="padding-top:16px">Operations</div>
    <a class="nav-item" href="06-maintenance.html"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>Maintenance</a>
    <a class="nav-item active" href="#"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>Fuel &amp; Expenses</a>
    <a class="nav-item" href="08-analytics.html"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21.21 15.89A10 10 0 1 1 8 2.83"/><path d="M22 12A10 10 0 0 0 12 2v10z"/></svg>Analytics</a>
  </div>
  <div class="sidebar-footer"><div class="avatar" style="background:#5b21b6">FA</div><div class="avatar-info"><div class="avatar-name">Finance Dept.</div><div class="avatar-role">Financial Analyst</div></div></div>
</nav>

<div class="main-content">
  <div class="topbar">
    <div class="topbar-left">
      <div class="page-title">Add Fuel / Expense</div>
    </div>
    <div class="topbar-right">
      <button class="btn btn-primary" onclick="window.location.href='15-action-success.html'">Save Expense</button>
    </div>
  </div>
  <div class="page-body">
    <div class="card" style="max-width:600px;margin:0 auto">
      <div class="card-header"><div class="card-title">Expense Details</div></div>
      <div class="card-body">
        
            <div class="form-group" style="margin-bottom:14px">
              <label class="form-label">Vehicle ID</label>
              <input class="form-input" type="text" placeholder="e.g. Truck-01">
            </div>
            <div class="form-group" style="margin-bottom:14px">
              <label class="form-label">Amount (Liters / Cost)</label>
              <input class="form-input" type="text" placeholder="e.g. 50 Liters">
            </div>
            <div class="form-group" style="margin-bottom:14px">
              <label class="form-label">Receipt Number</label>
              <input class="form-input" type="text" placeholder="e.g. REC-9923">
            </div>
        <div style="margin-top:20px">
          <button class="btn btn-primary" style="width:100%" onclick="window.location.href='15-action-success.html'">Save Expense</button>
        </div>
      </div>
    </div>
  </div>
